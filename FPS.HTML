<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Linked List FPS Game</title>
    <style>
        body { margin: 0; background: #111; color: white; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #222; margin: 0 auto; cursor: crosshair; }
        .ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>Linked List FPS</h1>
        <p>클릭하여 발사! 적을 맞추세요.</p>
        <p>현재 활성화된 총알 수: <span id="bulletCount">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bulletCountDisplay = document.getElementById('bulletCount');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 1. 연결 리스트 구현 ---
        class BulletNode {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.speed = 10;
                this.dx = Math.cos(angle) * this.speed;
                this.dy = Math.sin(angle) * this.speed;
                this.next = null; // 다음 노드를 가리킴
            }
        }

        class BulletList {
            constructor() {
                this.head = null;
                this.size = 0;
            }

            // 총알 추가 (머리에 추가)
            add(x, y, angle) {
                const newNode = new BulletNode(x, y, angle);
                newNode.next = this.head;
                this.head = newNode;
                this.size++;
            }

            // 총알 업데이트 및 화면 밖 삭제
            update() {
                let current = this.head;
                let prev = null;

                while (current) {
                    current.x += current.dx;
                    current.y += current.dy;

                    // 화면 밖으로 나가면 노드 삭제
                    if (current.x < 0 || current.x > canvas.width || current.y < 0 || current.y > canvas.height) {
                        if (prev === null) {
                            this.head = current.next;
                        } else {
                            prev.next = current.next;
                        }
                        this.size--;
                    } else {
                        prev = current;
                    }
                    current = current.next;
                }
            }

            draw() {
                let current = this.head;
                ctx.fillStyle = "#ffff00";
                while (current) {
                    ctx.beginPath();
                    ctx.arc(current.x, current.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    current = current.next;
                }
            }
        }

        // --- 2. 게임 오브젝트 ---
        const bullets = new BulletList();
        const player = { x: canvas.width / 2, y: canvas.height - 50 };
        const enemy = { x: canvas.width / 2, y: 100, radius: 30, dx: 3 };

        // --- 3. 게임 루프 ---
        function update() {
            // 적 이동
            enemy.x += enemy.dx;
            if (enemy.x > canvas.width - enemy.radius || enemy.x < enemy.radius) enemy.dx *= -1;

            // 총알 이동
            bullets.update();

            // 충돌 감지 (단순 거리 계산)
            let curr = bullets.head;
            let prev = null;
            while (curr) {
                const dist = Math.hypot(curr.x - enemy.x, curr.y - enemy.y);
                if (dist < enemy.radius) {
                    // 충돌 시 적 색상 변경 및 총알 삭제
                    enemy.x = Math.random() * canvas.width;
                    if (prev === null) bullets.head = curr.next;
                    else prev.next = curr.next;
                    bullets.size--;
                    break;
                }
                prev = curr;
                curr = curr.next;
            }

            bulletCountDisplay.innerText = bullets.size;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 플레이어 (삼각형)
            ctx.fillStyle = "#00ff00";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x - 20, player.y + 30);
            ctx.lineTo(player.x + 20, player.y + 30);
            ctx.fill();

            // 적 (원)
            ctx.fillStyle = "#ff4444";
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
            ctx.fill();

            // 총알
            bullets.draw();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // --- 4. 이벤트 리스너 ---
        window.addEventListener('click', (e) => {
            const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
            bullets.add(player.x, player.y, angle);
        });

        loop();
    </script>
</body>
</html>
